[binaries]
c = 'cl'
cpp = 'cl'
ar = 'lib'
windres = 'rc'
pkg-config = 'pkg-config'

# Run from a Visual Studio Developer Command Prompt (or equivalent shell)
# so cl/lib/rc are in PATH.
#
# GTK dependencies are resolved via pkg-config (.pc files). Install pkg-config
# (or pkgconf) and ensure PKG_CONFIG_PATH points to your GTK prefix, or use
# 1-configure-no-xfce-prebuilt.
